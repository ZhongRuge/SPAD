      - name: "balanced_192"                   # 总独立噪声约为 192 hits/frame
        description: "平衡噪声：background 与 dcr 各承担一半，总噪声约 192 hits/frame" # 情景说明
        background_cps: 600.721154             # 对应每帧约 96 次背景命中
        dcr_cps: 600.721154                    # 对应每帧约 96 次暗计数命中
      - name: "balanced_256"                   # 总独立噪声约为 256 hits/frame
        description: "平衡噪声：background 与 dcr 各承担一半，总噪声约 256 hits/frame" # 情景说明
        background_cps: 801.282737             # 对应每帧约 128 次背景命中
        dcr_cps: 801.282737                    # 对应每帧约 128 次暗计数命中
