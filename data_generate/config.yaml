sensor:
  width: 200
  height: 200
  fps: 250000
  pde: 1
  dead_time_ns: 50

simulation:
  total_seconds: 0.02
  batch_size: 1000
  random_seed: 42

scene:
  type: "moving_circle"
  background_cps: 20
  signal_cps: 5000
  target_radius: 20
  velocity_pps: 5000

noise:
  dcr_cps: 20
  crosstalk_orthogonal_prob: 0.0044
  crosstalk_diagonal_prob: 0.0006
  afterpulsing_prob: 0.01

io:
  output_dir: "../data"
  filename: "spad_dataset.bin"
  save_as_bits: true

paths:
  dataset:
    output_dir: "../data"
    filename: "spad_dataset.bin"
  compression:
    output_dir: "../data"

runtime:
  batch_size:
    generate: 1000
    compress: 1000

compression:
  algorithms:
    - "rle"
    - "delta_rle"
    - "delta_sparse"
    - "delta_sparse_zlib"
    - "aer"
    - "temporal_binning"
  algorithm_params:
    aer:
      use_delta: false
    temporal_binning:
      bin_size: 255

evaluation:
  verify_lossless: true

visualization:
  compressed:
    algorithm: "delta_sparse"
