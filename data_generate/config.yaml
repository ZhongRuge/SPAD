      - name: "balanced_096"                   # 总独立噪声约为 96 hits/frame
        description: "平衡噪声：background 与 dcr 各承担一半，总噪声约 96 hits/frame" # 情景说明
        background_cps: 300.180144             # 对应每帧约 48 次背景命中
        dcr_cps: 300.180144                    # 对应每帧约 48 次暗计数命中
      - name: "balanced_128"                   # 总独立噪声约为 128 hits/frame
        description: "平衡噪声：background 与 dcr 各承担一半，总噪声约 128 hits/frame" # 情景说明
